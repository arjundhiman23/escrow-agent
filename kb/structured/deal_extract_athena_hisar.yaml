notes:
  - This CAM presents projections in DSCR-calculation format (EBITDA / VGF adjustment / GST principal
    add-back / cash available for debt service / interest+BG fee / principal repayment / DSCR), not a full
    Income Statement — no explicit depreciation, PBT, PAT, or projected Balance Sheet (DSRA/reserve fund
    balances) table was found in the pages reviewed. The normalization layer will derive PBT/PAT as
    EBITDA-minus-interest with depreciation defaulted to 0, which understates real PAT (ignores D&A and
    tax) — treat the TRA "PAT" figures in generated reports as indicative only, not the audited figure.
  - Escrow Agreement PDF has a degraded embedded text layer (e.g. "AGREEf,IEI{T" for "AGREEMENT", "SOI.AR"
    for "SOLAR") — clauses were read allowing for these OCR-like artifacts; if precise clause wording is
    needed for a legal position, re-verify against the original scanned images rather than this extract.
  - DSRA specific quantum (exact Rs. crore for 1-quarter Original DSRA + Top-Up trigger) was not located in
    the extracted CAM/Agreement pages — only the "1 quarter cash DSRA" policy description. Confirm the cash
    figure from the Common Loan Agreement or DSRA calculation annexure.
  - This is a refinancing of 4 existing SECI/RUMSL solar projects; only Athena Hisar's own figures were
    extracted here — the other 3 projects' CAM sections were not reviewed.
  - Bank statement shows a "Cash Trap Account 1" and "Cash Trap Account 2" (matching the 1st/2nd DSCR
    testing trap mechanism in CV2) plus a separate "Cash Sweep Account" — useful cross-check once enough
    quarters of data exist to observe a DSCR-triggered trap/sweep event.
