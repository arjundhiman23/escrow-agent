# Structured deal extract — Kallagam-Meensurutti Highway Pvt. Ltd. (KMHPL)
# Verified against source pages: CAM (native text, CAM592406210029) + Escrow Agreement OCR (67pp scanned).
deal:
  borrower: Kallagam-Meensurutti Highway Private Limited (KMHPL)
  sponsor: Oriental Structural Engineers Private Limited (Oriental Group)
  lender: Axis Bank Limited (consortium, Rs. 260 crore hold / 57% share; also Escrow Bank, Lenders' Agent)
  authority: NHAI
  facility: Rupee Term Loan of Rs. 455.60 crore (refinance + construction funding) + Mobilisation Advance BG sublimit Rs. 100 crore
  facility_amount: Rs. 455.60 crore
  project: >
    Four-laning of Kallagam-Karuppur (Km 38.700 to 50.382) and two-laning with paved shoulder of
    Karuppur-Meensurutti (Km 50.382 to 98.433), NH-227, Tamil Nadu, NHDP Phase-IV, HAM basis (59.733 km)
  concession_agreement_signed: "2018-04-24"
  cam_ref: CAM592406210029

# ---------------------------------------------------------------- CATRA debit side
# Escrow Agreement (Common Loan/Escrow mechanics doc) clause 2.5(B) — Operational Period Order of Priority
order_of_priority:
  - {priority: 1, code: STAT_DUES, item: i,   name: Statutory Dues,                 sub_account: KMHPL Statutory Dues OPN Sub-Account,
     agreement_item: "2.5(B)(i)", desc: All Statutory Dues payable in connection with Project operation post-COD}
  - {priority: 2, code: OM_EXP,    item: ii,  name: O&M Expenses,                   sub_account: KMHPL O&M Expenses OPN Sub-Account,
     agreement_item: "2.5(B)(ii)", desc: O&M Expenses per Approved Operating Budget; Administrative Expenses passed through same-day}
  - {priority: 3, code: NHAI_OM,   item: iii, name: NHAI O&M Expenses,              sub_account: KMHPL NHAI O&M Expenses OPN Sub-Account,
     agreement_item: "2.5(B)(iii)", desc: O&M Expenses incurred and claimed by the Authority per Concession Agreement Art. 4.1.1(e)}
  - {priority: 4, code: NHAI_DUES, item: iv,  name: NHAI Dues,                      sub_account: KMHPL NHAI Dues OPN Sub-Account,
     agreement_item: "2.5(B)(iv)", desc: Amounts due to Authority towards NHAI Dues / premium per Concession Agreement}
  - {priority: 5, code: DEBT_SERV, item: v,   name: Debt Service Payments,          sub_account: KMHPL Debt Service Payments OPN Sub-Account,
     agreement_item: "2.5(B)(v)", desc: Debt Service Payments incl. Prepayment Premium; Annuity applied first to BG Facility then Term Loan}
  - {priority: 6, code: NHAI_DMG,  item: vi,  name: NHAI Payments and Damages,      sub_account: KMHPL NHAI Payments and Damages OPN Sub-Account,
     agreement_item: "2.5(B)(vi)", desc: NHAI Payments and Damages payable under Concession Agreement}
  - {priority: 7, code: WCR,       item: vii, name: Opex Reserve (Working Capital Reserve), sub_account: KMHPL Opex Reserve OPN Sub-Account,
     agreement_item: "2.5(B)(vii)", desc: Working-capital-equivalent reserve; used till first Annuity and between Annuity dates; replenished on Annuity receipt}
  - {priority: 8, code: DSRA,      item: viii, name: Debt Service Reserve,          sub_account: KMHPL Debt Service Reserve OPN Sub-Account,
     agreement_item: "2.5(B)(viii)", desc: DSRA = next principal instalment + next 6 months interest/fees; 25% at COD, balance from first 2 annuities}
  - {priority: 9, code: MMRA,      item: ix,  name: Major Maintenance Reserve,      sub_account: KMHPL Major Maintenance Reserve OPN Sub-Account,
     agreement_item: "2.5(B)(ix)", desc: Per Base Case Plan; usable on Operating Fund Account shortfall for major maintenance}
  - {priority: 10, code: DISTRIB,  item: x,   name: Surplus / Distribution,         sub_account: KMHPL Surplus OPN Sub-Account,
     agreement_item: "2.5(B)(x)", desc: Residual surplus after items (i)-(ix), applied per Clause 3.10 (Restricted Payments)}

# CAM's embedded Waterfall Mechanism (item 35) — cross-check vs Escrow Agreement clause 2.5(B)
sanction_waterfall:
  - {step: 1,  text: To meet any statutory dues,                                              maps_to: STAT_DUES}
  - {step: 2,  text: Construction related expenses (during construction period),               maps_to: CONSTR}
  - {step: 3,  text: O&M expenses subject to ceiling (to extent of O&M Payments from NHAI),     maps_to: OM_EXP}
  - {step: 4,  text: O&M Expenses and other costs incurred by the Authority,                    maps_to: NHAI_OM}
  - {step: 5,  text: Amounts due and payable to the Authority,                                  maps_to: NHAI_DUES}
  - {step: 6,  text: Interest service in relation to Facility,                                  maps_to: DEBT_SERV}
  - {step: 7,  text: Scheduled principal repayment in relation to Facility,                     maps_to: DEBT_SERV}
  - {step: 8,  text: Damages payable to the Authority per Concession Agreement,                 maps_to: NHAI_DMG}
  - {step: 9,  text: Funding Working Capital Reserve Account,                                   maps_to: WCR}
  - {step: 10, text: Funding the DSRA to the required DSRA Amount,                              maps_to: DSRA}
  - {step: 11, text: Funding the MMRA to the required MMR Amount,                               maps_to: MMRA}
  - {step: 12, text: Cash Sweep if applicable,                                                  maps_to: CASH_SWEEP}
  - {step: 13, text: Distribute residual amounts subject to Restricted Payments,                maps_to: DISTRIB}

waterfall_divergences:
  - CAM waterfall (item 35) has separate steps for construction-period expenses (step 2) and a Cash Sweep
    step (step 12); the Escrow Agreement's Operational Period Order of Priority (2.5(B)) has neither as a
    distinct numbered item — construction-period spend is governed separately via the KMHPL Construction
    Fund Account, and no explicit Cash Sweep sub-account appears in the operational waterfall. Confirm
    whether Cash Sweep is applied within the Surplus/Distribution step (x) or is a Facility-level mechanic.
  - The CAM waterfall's step 8 (damages) sits after debt service, matching Escrow Agreement item (vi); order
    is otherwise consistent between the two documents.

# ---------------------------------------------------------------- CATRA credit side
# Six Retention Accounts under the main KMHPL Escrow Account per clause 2.3(ii); deposit categories inferred
# from account purposes (Construction Fund, Operating Fund, Insurance Proceeds, Termination Proceeds &
# General Compensation, Distribution, Enforcement Proceeds).
permitted_deposits:
  - {code: EQUITY,     item: a, name: Equity / Sponsor subscription monies}
  - {code: DISBURSE,   item: b, name: Facility disbursements (Construction Period)}
  - {code: ANNUITY,    item: c, name: Annuity Collection incl. O&M Receipts and Interest on Annuity}
  - {code: PROCEEDS,   item: d, name: NHAI funding incl. Mobilisation Advance, Insurance Proceeds, Termination
                                  Proceeds and General Compensation, Sponsor/Promoter monies (incl. DSRA/WCR funding)}
  - {code: RETENTION,  item: e, name: Transfers between KMHPL Retention Accounts / Sub-Accounts}
  - {code: INV_INCOME, item: f, name: Investment income on Permitted Investments (Liquid/Debt MFs rated AAA, FDs in Escrow Bank)}
  - {code: OTHER_DEP,  item: g, name: Other amounts not required to be paid into another Retention Account}

# ---------------------------------------------------------------- covenants
covenants:
  - id: CV1
    source: Escrow Agreement 2.5(B)(vii) / CAM Reserve Accounts clause
    rule: Opex/Working Capital Reserve = 6 months interest servicing + O&M expense per Base Case Plan; created at COD; used till first Annuity and between Annuity dates; replenished on NHAI payment receipt.
  - id: CV2
    source: Escrow Agreement 2.5(B)(viii) / CAM Reserve Accounts clause
    rule: DSRA = next principal instalment + next 6 months interest/fees/obligations; 25% of DSRA created on/before COD; balance created from project cash accruals of the first two Annuity payments; toppable via Bank Guarantee in lieu of cash.
  - id: CV3
    source: Escrow Agreement 2.5(B)(ix) / CAM Reserve Accounts clause
    rule: MMRA funded per Base Case Plan / LIE-recommended annexure; usable on Operating Fund Account shortfall for major maintenance; replaceable by Bank Guarantee.
  - id: CV4
    source: Escrow Agreement 2.5(B) proviso
    rule: Annuity Payments required to top up the Opex Reserve are transferred directly from the Operating Fund Account to the Opex Reserve Sub-Account, notwithstanding the standard Order of Priority.
  - id: CV5
    source: Escrow Agreement 2.2(d)
    rule: Escrow Bank shall not permit any Restricted Payment (or other Escrow Account monies) unless the Lenders' Agent has confirmed in writing that Restricted Payment Conditions are satisfied.
  - id: CV6
    source: Escrow Agreement 2.5(B) chapeau
    rule: Borrower may not withdraw from the KMHPL Operating Fund Account otherwise than via the Operational Period Order of Priority on Cash Transfer Dates.
  - id: CV7
    source: CAM Sponsor Support clause
    rule: Sponsor/Promoter funds brought in to cover cash mismatch are subordinated to the Facility; Sponsor waives EoD rights on such subordinated debt; shortfall funding due at least 2 business days prior to the relevant payment date.

