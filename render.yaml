services:
  - type: web
    name: escrow-analyst-console
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_PREFIX
        value: escrow-agent
